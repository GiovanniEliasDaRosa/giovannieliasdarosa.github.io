name: Deploy Vite React to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./new-portifolio
        run: npm install

      - name: Build
        working-directory: ./new-portifolio
        env:
          VITE_BASE_PATH: /new-portifolio/
        run: npm run build

      - name: Disable Jekyll
        run: touch ./new-portifolio/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./new-portifolio/dist
          publish_branch: gh-pages
